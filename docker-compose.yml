version: '3.8'

services:
  brickgen:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brickgen
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ldraw-data:/app/data/ldraw
      - stl-cache:/app/cache
      - database:/app/database
    # Do not set REBRICKABLE_API_KEY here so env_file: .env can provide it (environment: overrides env_file)
    environment:
      - DEFAULT_PLATE_WIDTH=${DEFAULT_PLATE_WIDTH:-220}
      - DEFAULT_PLATE_DEPTH=${DEFAULT_PLATE_DEPTH:-220}
      - DEFAULT_PLATE_HEIGHT=${DEFAULT_PLATE_HEIGHT:-250}
      - PART_SPACING=${PART_SPACING:-2}
      - LDRAW_LIBRARY_PATH=/app/data/ldraw
      - CACHE_DIR=/app/cache
      - DATABASE_PATH=/app/database/brickgen.db
    # No automatic restart - configuration errors require manual intervention
    # Users should fix their .env file and explicitly restart with: docker-compose up -d
    restart: "no"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ldraw-data:
    driver: local
  stl-cache:
    driver: local
  database:
    driver: local
